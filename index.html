<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#30263d">
<meta name="description" content="Explora libros, temas y perspectivas mediante rutas de lectura personalizadas.">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="stylesheet" href="./styles.css">
<title>Rutas de Lectura Pro</title>
</head>
<body>
<header class="topbar">
  <div>
    <p class="eyebrow">Biblioteca inteligente</p>
    <h1>Rutas de Lectura</h1>
  </div>
  <button id="installBtn" class="ghost hidden">Instalar</button>
</header>

<nav class="tabs" aria-label="Secciones">
  <button class="tab active" data-view="explorar">Explorar</button>
  <button class="tab" data-view="biblioteca">Biblioteca</button>
  <button class="tab" data-view="guardados">Guardados</button>
  <button class="tab" data-view="actividad">Actividad</button>
</nav>

<main>
<section id="view-explorar" class="view active">
  <div class="hero-card">
    <p class="eyebrow">Comienza desde una obra</p>
    <h2>¿Qué idea quieres seguir?</h2>
    <p>Selecciona un libro, un tema y el tipo de perspectiva que buscas.</p>
  </div>

  <section class="panel">
    <label for="startSearch">Buscar libro de partida</label>
    <input id="startSearch" type="search" placeholder="Título o autor">
    <label for="bookSelect">Libro</label>
    <select id="bookSelect"></select>
    <div id="bookInfo" class="book-info"></div>
  </section>

  <section class="panel">
    <h2>Configura la ruta</h2>
    <label>Tema central</label>
    <div id="topicChips" class="chips"></div>

    <label for="approachSelect">Enfoque</label>
    <select id="approachSelect">
      <option value="todos">Todos</option>
      <option value="ensayo">Ensayo</option>
      <option value="academico">Académico / divulgación</option>
      <option value="ficcion">Ficción</option>
      <option value="novela-historica">Novela histórica</option>
      <option value="ciencia-ficcion">Ciencia ficción</option>
      <option value="biografia">Biografía</option>
    </select>

    <label for="goalSelect">Objetivo</label>
    <select id="goalSelect">
      <option value="ampliar">Ampliar la idea</option>
      <option value="contextualizar">Dar contexto histórico</option>
      <option value="cuestionar">Cuestionar la perspectiva</option>
      <option value="aplicar">Llevarla a otro campo</option>
    </select>

    <button id="buildRoute" class="primary">Crear ruta</button>
  </section>

  <section class="panel">
    <div class="row-between">
      <div><p class="eyebrow">Resultados</p><h2>Tu ruta</h2></div>
      <button id="newRoute" class="ghost">Otra ruta</button>
    </div>
    <div id="recommendations" class="cards"><p class="empty">Crea una ruta para comenzar.</p></div>
  </section>
</section>

<section id="view-biblioteca" class="view">
  <section class="panel">
    <h2>Biblioteca completa</h2>
    <div class="stats" id="libraryStats"></div>
    <input id="librarySearch" type="search" placeholder="Buscar título, autor o tema">
    <div class="filters">
      <select id="genreFilter"><option value="todos">Todos los géneros</option></select>
      <select id="topicFilter"><option value="todos">Todos los temas</option></select>
    </div>
    <div id="libraryGrid" class="library-grid"></div>
  </section>
</section>

<section id="view-guardados" class="view">
  <section class="panel">
    <div class="row-between"><h2>Libros guardados</h2><button id="clearSaved" class="danger-link">Vaciar</button></div>
    <div id="savedGrid" class="library-grid"></div>
  </section>
</section>

<section id="view-actividad" class="view">
  <section class="panel">
    <div class="row-between"><h2>Tu actividad</h2><button id="exportData" class="ghost">Exportar</button></div>
    <div id="activityStats" class="stats"></div>
    <h3>Rutas recientes</h3>
    <div id="historyList" class="history"></div>
  </section>
</section>
</main>

<div id="toast" class="toast"></div>
<script src="./app.js"></script>
</body>
</html>
